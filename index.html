<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بث أسعار حريتاني</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .status { padding: 10px 20px; border-radius: 5px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        .online { background: #28a745; color: white; }
        .waiting { background: #ffc107; color: #000; }
        #data-display { font-size: 1.5rem; color: #00ff00; margin-top: 20px; line-height: 2; }
    </style>
</head>
<body>

    <div id="statusBadge" class="status waiting">جاري الاتصال بالسيرفر التركي...</div>
    <div id="data-display">بانتظار وصول أول سعر...</div>

    <script>
        // 1. تأكد من وضع المفتاح بدقة هنا
        const MY_KEY = "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"; 

        // 2. الربط المزدوج (Auth + Query) لضمان القبول
        const socket = io("https://sse.datshop.com.tr", {
            auth: { socket_key: MY_KEY },
            query: { socket_key: MY_KEY },
            transports: ['websocket', 'polling'],
            forceNew: true,
            reconnection: true
        });

        const badge = document.getElementById('statusBadge');
        const display = document.getElementById('data-display');

        socket.on("connect", () => {
            badge.innerText = "✅ تم الاتصال بنجاح";
            badge.className = "status online";
            console.log("Connected!");
        });

        // 3. استخدام اسم الحدث الصحيح 'price_changed'
        socket.on("price_changed", (data) => {
            console.log("بيانات حية:", data);
            badge.innerText = "⚡ بث مباشر نشط";
            
            if (data && data.length > 0) {
                const item = data[0]; 
                display.innerHTML = `
                    <div style="border: 1px solid #333; padding: 20px; display: inline-block; border-radius: 10px;">
                        <span style="color: #ffc107; font-size: 2rem;">${item.symbol || 'الذهب'}</span><br>
                        شراء: ${item.bid || item.alis} | مبيع: ${item.ask || item.satis}
                    </div>
                `;
            }
        });

        socket.on("connect_error", (err) => {
            badge.innerText = "❌ خطأ: " + err.message;
            badge.className = "status waiting";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اختبار الاتصال</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <h1 id="status" style="color: orange;">جاري محاولة الاتصال بالسيرفر...</h1>
    <div id="debug" style="background: #eee; padding: 10px; font-family: monospace;"></div>

    <script>
        // 1. ضع المفتاح السري هنا بدقة
        const MY_SOCKET_KEY = "ضَع_مفتاحك_هنا"; 

        const statusText = document.getElementById('status');
        const debugDiv = document.getElementById('debug');

        // إعدادات الربط المباشر مع Datshop
        const socket = io("https://sse.datshop.com.tr", {
            auth: { socket_key: MY_SOCKET_KEY },
            transports: ["websocket"]
        });

        socket.on("connect", () => {
            statusText.innerText = "✅ نجح الاتصال! السيرفر قبل المفتاح.";
            statusText.style.color = "green";
            debugDiv.innerHTML += "<p>تم فتح القناة بنجاح.</p>";
        });

        socket.on("price_update", (data) => {
            debugDiv.innerHTML = "<p>وصلت بيانات الآن! عدد العناصر: " + data.length + "</p>";
            console.log(data);
        });

        socket.on("connect_error", (err) => {
            statusText.innerText = "❌ فشل الاتصال: " + err.message;
            statusText.style.color = "red";
            debugDiv.innerHTML += "<p>خطأ: تأكد من صحة المفتاح أو صلاحية الرابط.</p>";
        });
    </script>
</body>
</html>

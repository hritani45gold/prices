<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بث أسعار حريتاني</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .status { padding: 10px; border-radius: 5px; display: inline-block; margin-bottom: 20px; }
        .online { background: #28a745; }
        .waiting { background: #ffc107; color: #000; }
        #data-display { font-size: 1.2rem; color: #00ff00; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="statusBadge" class="status waiting">جاري الاتصال بالسيرفر التركي...</div>
    <div id="data-display">بانتظار وصول أول سعر...</div>

    <script>
        // 1. ضع مفتاحك السري هنا
        const MY_KEY = "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"; 

        // 2. إعداد الربط المباشر
        const socket = io("https://sse.datshop.com.tr", {
            auth: { socket_key: MY_KEY },
            query: { socket_key: MY_KEY },
            transports: ['websocket', 'polling']
        });

        const badge = document.getElementById('statusBadge');
        const display = document.getElementById('data-display');

        socket.on("connect", () => {
            badge.innerText = "✅ متصل الآن - السيرفر جاهز";
            badge.className = "status online";
        });

        // 3. الاستماع لحدث 'price_changed' كما ورد في تعليمات الـ PHP
        socket.on("price_changed", (data) => {
            console.log("وصلت بيانات:", data);
            badge.innerText = "⚡ بث مباشر نشط";
            
            if (data && data.length > 0) {
                // عرض عينة من أول سعر واصل للتأكد
                const firstItem = data[0];
                display.innerHTML = `تم استقبال تحديث لـ: ${firstItem.symbol || 'الذهب'}<br>
                                    شراء: ${firstItem.bid} | مبيع: ${firstItem.ask}`;
            }
        });

        socket.on("connect_error", (err) => {
            badge.innerText = "❌ فشل: " + err.message;
            badge.className = "status waiting";
        });
    </script>
</body>
</html>
